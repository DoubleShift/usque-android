name: Build APK

# Free build on public GitHub repos. Triggers on push to main/master,
# on tags (for releases), and via manual dispatch from the Actions tab.
on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed by softprops/action-gh-release to create releases

    env:
      # Go version must match go.mod's `go 1.x.x` directive.
      GO_VERSION: "1.24.2"
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.caching=true"

    steps:
      # ---------- Checkout ----------
      - name: Checkout source
        uses: actions/checkout@v4

      # ---------- JDK (Gradle requires JDK 17 for AGP 8.x) ----------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ---------- Go (for gomobile bind) ----------
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # ---------- Android SDK (pre-installed on ubuntu-latest) ----------
      # The ubuntu-latest runner ships with Android SDK, build-tools, platforms
      # and multiple NDK versions pre-installed at $ANDROID_SDK_ROOT.
      # We just need to locate the NDK and export the env vars gomobile needs.
      - name: Export Android env vars
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          # Pick the highest available NDK version pre-installed on the runner
          NDK_DIR=$(ls -d "$ANDROID_SDK_ROOT"/ndk/*/ 2>/dev/null | sort -V | tail -n1)
          if [ -z "$NDK_DIR" ]; then
            echo "No NDK found, installing ndk;27.0.12077973 via sdkmanager"
            yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --install "ndk;27.0.12077973" >/dev/null 2>&1
            NDK_DIR="$ANDROID_SDK_ROOT/ndk/27.0.12077973"
          fi
          NDK_HOME="${NDK_DIR%/}"
          echo "ANDROID_NDK_HOME=$NDK_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$NDK_HOME" >> $GITHUB_ENV
          echo "PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_ENV
          echo "Using NDK: $NDK_HOME"

      # ---------- Build the usque.aar Go library via gomobile ----------
      - name: Install gomobile and build usque.aar
        working-directory: ${{ github.workspace }}
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init -v
          gomobile bind -v \
            -target=android/arm64,android/arm \
            -androidapi 24 \
            -ldflags="-s -w" \
            -o android/usque.aar \
            github.com/Diniboy1123/usque/android

      - name: Place AAR into app/libs
        run: |
          mkdir -p android/usque-vpn/app/libs
          cp android/usque.aar android/usque-vpn/app/libs/usque.aar
          ls -la android/usque-vpn/app/libs/

      # ---------- Gradle build ----------
      # Repo only ships gradlew.bat (Windows). Use the official Gradle setup
      # action to install Gradle 8.5 (matches gradle-wrapper.properties) on
      # the runner, then invoke `gradle` directly.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.5"
          cache-disabled: false

      - name: Build debug APK
        working-directory: android/usque-vpn
        run: gradle assembleDebug --no-daemon --stacktrace

      # ---------- Upload artifacts ----------
      - name: Locate APK
        id: apk
        run: |
          APK=$(find android/usque-vpn/app/build/outputs/apk -name "*.apk" | head -n1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: usque-vpn-re-debug-apk
          path: ${{ steps.apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30

      # ---------- (Optional) Release on tag ----------
      - name: Release APK on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.apk_path }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
